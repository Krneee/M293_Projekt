<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>David Krnetic – Fähigkeiten</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        .skills-section {
            margin-bottom: 2rem;
        }

        .skill-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.9rem;
            margin-top: 0.5rem;
        }

        .skill-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
            padding: 1.1rem 0.5rem;
            transition: border-color var(--transition), transform var(--transition);
        }
        .skill-item:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
        }
        .skill-icon {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .skill-icon img {
            width: 36px;
            height: 36px;
            /* Recolour any SVG to gold (#c9a962) via CSS filter */
            filter: brightness(0) saturate(100%) invert(72%) sepia(38%) saturate(500%) hue-rotate(5deg) brightness(98%) contrast(90%);
        }
        .skill-item span {
            font-size: 0.82rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .knowledge-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 0.5rem;
        }
        .knowledge-tag {
            background: var(--gold);
            color: var(--bg-dark);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.35rem 1rem;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo">DAVID</a>
    <button class="nav-toggle" aria-label="Menü" onclick="toggleNav(this)">
        <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="faehigkeiten.html" class="active">Fähigkeiten</a></li>
        <li><a href="projekte.html">Projekte</a></li>
        <li><a href="kontakt.html">Kontakt</a></li>
    </ul>
</nav>

<main>
    <div class="card skills-section">
        <p class="section-title">Fähigkeiten:</p>
        <div class="skill-grid">
            <div class="skill-item">
                <div class="skill-icon">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/html5/html5-original.svg" alt="HTML/CSS" />
                </div>
                <span>HTML/CSS</span>
            </div>
            <div class="skill-item">
                <div class="skill-icon">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/java/java-original.svg" alt="Java" />
                </div>
                <span>Java</span>
            </div>
            <div class="skill-item">
                <div class="skill-icon">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/python/python-original.svg" alt="Python" />
                </div>
                <span>Python</span>
            </div>
            <div class="skill-item">
                <div class="skill-icon">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/react/react-original.svg" alt="React" />
                </div>
                <span>React</span>
            </div>
            <div class="skill-item">
                <div class="skill-icon">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/mysql/mysql-original.svg" alt="SQL" />
                </div>
                <span>SQL</span>
            </div>
            <div class="skill-item">
                <div class="skill-icon">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/c/c-original.svg" alt="C" />
                </div>
                <span>C</span>
            </div>
        </div>
    </div>

    <div class="card">
        <p class="section-title">Kenntnisse:</p>
        <div class="knowledge-grid">
            <span class="knowledge-tag">Frontend</span>
            <span class="knowledge-tag">Backend</span>
            <span class="knowledge-tag">Datenbanken</span>
            <span class="knowledge-tag">Abfragen</span>
            <span class="knowledge-tag">Betriebssysteme</span>
            <span class="knowledge-tag">Fullstack</span>
        </div>
    </div>
</main>

<footer>
    &copy; 2026 David Krnetic. Alle Rechte vorbehalten.
</footer>

<script>
    function toggleNav(btn) {
        btn.classList.toggle('open');
        document.querySelector('.nav-links').classList.toggle('open');
    }
</script>
</body>
</html>
