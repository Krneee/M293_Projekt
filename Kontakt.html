<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>David Krnetic - Kontakt</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        .contact-info {
            margin-bottom: 1.5rem;
            padding: 1.5rem;
        }
        .contact-info h2 {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-white);
            margin-bottom: 1rem;
            text-align: center;
        }
        .contact-info p {
            font-size: 0.9rem;
            color: var(--text-light);
            text-align: center;
            line-height: 2;
        }
        .contact-info a {
            color: var(--gold);
        }
        .social-row {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
        }
        .social-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--text-light);
            transition: border-color var(--transition), color var(--transition);
            cursor: pointer;
        }
        .social-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .contact-form {
            padding: 1.5rem;
        }
        .form-group {
            margin-bottom: 0.9rem;
        }
        .form-control {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-light);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            padding: 0.7rem 1rem;
            outline: none;
            transition: border-color var(--transition);
            resize: vertical;
        }
        .form-control::placeholder {
            color: var(--text-muted);
        }
        .form-control:focus {
            border-color: var(--gold);
        }
        textarea.form-control {
            min-height: 100px;
        }
        .submit-row {
            text-align: right;
        }
    </style>
</head>
